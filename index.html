<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mon Site</title>

    <!-- Ton CSS -->
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- NAVBAR BOOTSTRAP -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">MonSite</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#accueil">Accueil</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#apropos">À propos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ACCUEIL -->
<section id="accueil" class="p-5 text-center">
    <h1>Bienvenue sur mon site</h1>
    <p>Page d’accueil simple avec Bootstrap</p>
</section>

<!-- À PROPOS -->
<section id="apropos" class="p-5">
    <h2 class="mb-4">À propos de moi</h2>
    <p>
        Je suis un développeur débutant passionné par le web.
    </p>

    <h3 class="mt-4">Compétences</h3>

    <p>HTML</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-success" style="width: 85%;">85%</div>
    </div>

    <p>CSS</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-info" style="width: 75%;">75%</div>
    </div>

    <p>JavaScript</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-warning" style="width: 50%;">50%</div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="p-5">
    <h2>Contact</h2>
    <p>Page de contact à venir.</p>
</section>

<!-- Ton JS -->
<script src="java.js"></script>

</body>
</html>
